<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stopwatch</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="background-grid"></div>

    <div class="theme-switcher">
        <button class="theme theme--amber" onclick="setTheme('amber')"></button>
    </div>

    <main class="app">

        <header class="app__header">
            <h1>Stopwatch</h1>
            <p id="clock"></p>
        </header>

        <section class="timer">
            <div id="particles"></div>

            <svg width="300" height="300">
                <circle class="timer__bg" cx="150" cy="150" r="130"></circle>
                <circle class="timer__progress" cx="150" cy="150" r="130"></circle>
            </svg>

            <div id="display" class="timer__display">00:00:00.00</div>
        </section>

        <section class="controls">
            <button onclick="startStop()">▶</button>
            <button onclick="lap()">⚑</button>
            <button onclick="reset()">↺</button>
            <button onclick="toggleFullscreen()">⛶</button>
            <button onclick="exportLaps()">📥</button>
        </section>

        <section class="laps">
            <h2>Laps</h2>
            <ul id="laps"></ul>
        </section>

        <footer class="hint">
            Space • Start/Pause | L • Lap | R • Reset
        </footer>

    </main>

    <audio id="clickSound" src="click.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
